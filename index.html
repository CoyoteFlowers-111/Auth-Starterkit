<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auth Starter Kit</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
  <h1>🔑 Auth Starter Kit</h1>
  <p class="subtitle">A drop-in JWT auth boilerplate. Register, log in, and hit a protected route.</p>

  <div class="grid">
    <div class="card">
      <h2>Register</h2>
      <form id="register-form">
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-password" placeholder="Password (8+ chars)" required>
        <button type="submit">Register</button>
      </form>
      <p class="message" id="reg-message"></p>
    </div>

    <div class="card">
      <h2>Log in</h2>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Log in</button>
      </form>
      <p class="message" id="login-message"></p>
    </div>
  </div>

  <div class="card">
    <h2>Protected route</h2>
    <p>Once logged in, your token is stored and used automatically.</p>
    <button id="protected-btn">Call /api/protected</button>
    <pre id="protected-result"></pre>
  </div>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
